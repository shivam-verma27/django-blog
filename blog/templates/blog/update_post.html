{% extends 'blog/base.html' %}

{% block content %}
<h1>Update Post</h1>

<form method="POST">
    {% csrf_token %}
    <input
        type="text"
        name="title"
        placeholder="Title"
        value="{{ post.title }}">
    <br><br>
    <textarea
        name="content"
        placeholder="Content">{{ post.content }}</textarea>
    <br><br>
    <button type="submit">Update</button>
</form>
{% endblock %}
